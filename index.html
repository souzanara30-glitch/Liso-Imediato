<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kit Liso Mágico | Resultado de Salão em Casa</title>
    <style>
        :root {
            --roxo-escuro: #4b0082;
            --roxo-medio: #6a0dad;
            --lilas: #e6e6fa;
        }
        body { font-family: sans-serif; margin: 0; background-color: var(--lilas); color: #333; text-align: center; }
        .aviso { background: var(--roxo-escuro); color: white; padding: 10px; font-weight: bold; }
        .hero { padding: 40px 20px; background: white; }
        .hero h1 { color: var(--roxo-medio); margin-bottom: 5px; }
        .main-img { width: 100%; max-width: 500px; border-radius: 15px; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .oferta { background: white; padding: 20px; border: 2px solid var(--roxo-medio); border-radius: 15px; margin: 20px; }
        .pagamento-entrega { color: #d9534f; font-size: 1.4em; font-weight: bold; display: block; }
        .btn-compra { display: block; background: #28a745; color: white; padding: 20px; text-decoration: none; font-size: 1.5em; font-weight: bold; border-radius: 50px; margin: 20px; }
        .antes-depois { display: flex; gap: 10px; justify-content: center; padding: 20px; }
        .antes-depois img { width: 45%; border-radius: 10px; border: 2px solid var(--roxo-medio); }
        .footer { padding: 20px; }
        .social { display: inline-block; padding: 10px 20px; color: white; text-decoration: none; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>

    <div class="aviso">🔥 ÚLTIMAS UNIDADES COM ESCOVA ALISADORA INCLUSA!</div>

    <section class="hero">
        <h1>Cabelo com brilho e sedoso!</h1>
        <p>Resultado de salão em casa!</p>
        <img src="WhatsApp Image 2026-03-06 at 13.20.00.jpeg" class="main-img" alt="Kit Liso Mágico">
    </section>

    <div class="oferta">
        <span class="pagamento-entrega">⭐ PAGUE SOMENTE NA ENTREGA! ⭐</span>
        <p>Também aceitamos Pix e Cartão de Crédito.</p>
        <h2 style="font-size: 2em;">Apenas R$ 149,90</h2>
        <a href="https://app.coinzz.com.br/checkout/kitliso-magico-0" class="btn-compra">COMPRAR AGORA</a>
    </div>

    <div style="padding: 20px; background: white;">
        <h3>Resultados Reais</h3>
        <div class="antes-depois">
            <img src="WhatsApp Image 2026-03-06 at 13.20.01.jpeg" alt="Antes e Depois">
            <img src="WhatsApp Image 2026-03-06 at 13.20.02.jpeg" alt="Resultado">
        </div>
    </div>

    <div class="footer">
        <a href="https://www.instagram.com/kitlisoimediato?igsh=MXRxMGZkeWxkZGY1Ng==" class="social" style="background: #e1306c;">Instagram</a>
        <a href="https://www.facebook.com/share/1CGCVkDHEs/" class="social" style="background: #4267b2;">Facebook</a>
    </div>

</body>
</html>
